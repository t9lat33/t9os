<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>T9 Browser</title>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/baremux/index.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
* { box-sizing: border-box; font-family: Inter, system-ui; }

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #1e1e1e;
    overflow: hidden;
}

/* ===== TOP BAR ===== */
.browser-ui {
    height: 96px;
    background: #2b2b2b;
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid #111;
    z-index: 10;
}

/* ===== TABS ===== */
.tabs {
    height: 38px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 6px;
    overflow-x: auto;
}

.tab {
    height: 28px;
    min-width: 160px;
    max-width: 220px;
    padding: 0 12px;
    border-radius: 8px 8px 0 0;
    background: #3a3a3a;
    color: #ddd;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
}

.tab.active {
    background: #1e1e1e;
    color: white;
}

.tab span {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.tab i {
    opacity: .6;
}
.tab i:hover {
    opacity: 1;
    color: #ff6b6b;
}

.newtab {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: #aaa;
    cursor: pointer;
}
.newtab:hover { background: #444; }

/* ===== NAV BAR ===== */
.navbar {
    height: 58px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
}

.navbar button {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #bbb;
    cursor: pointer;
}
.navbar button:hover {
    background: #3a3a3a;
    color: white;
}

/* ===== URL BAR ===== */
.urlbar {
    flex: 1;
    height: 36px;
    background: #3a3a3a;
    border-radius: 18px;
    padding: 0 16px;
    display: flex;
    align-items: center;
}

.urlbar input {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: white;
    font-size: 14px;
}

/* ===== VIEWPORT ===== */
.viewframe {
    position: absolute;
    top: 96px;
    left: 0;
    width: 100%;
    height: calc(100% - 96px);
    border: none;
    display: none;
    background: white;
}

.viewframe.active {
    display: block;
}

/* ===== NTP ===== */
.ntp {
    position: absolute;
    top: 96px;
    left: 0;
    width: 100%;
    height: calc(100% - 96px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    pointer-events: none;
}
body{
      background-repeat: no-repeat;
  background-size: cover;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="browser-ui">
    <div class="tabs" id="tabs">
        <button class="newtab" id="newtab"><i class="fas fa-plus"></i></button>
    </div>

    <div class="navbar">
        <button id="back"><i class="fas fa-arrow-left"></i></button>
        <button id="forward"><i class="fas fa-arrow-right"></i></button>
        <button id="reload"><i class="fas fa-rotate-right"></i></button>

        <form class="urlbar" id="form">
            <input id="url" placeholder="Search or enter address">
        </form>

        <button id="popout"><i class="fas fa-external-link"></i></button>
    </div>
</div>

<div class="ntp" id="ntp">
    <h1>T9 Browser</h1>
</div>

<script>
// Check if we're on t9os.space to determine proxy mode
const isT9OS = location.hostname === "t9os.space" || location.hostname === "www.t9os.space";
const USE_CODETABS_PROXY = isT9OS;

navigator.serviceWorker?.register("/uv/sw.js")

const connection = new BareMux.BareMuxConnection("/baremux/worker.js")
connection.setTransport("/libcurl/index.mjs", [{ websocket: "wss://wisp.rhw.one/" }])

const tabsEl = document.getElementById("tabs")
const newTabBtn = document.getElementById("newtab")
const urlInput = document.getElementById("url")
const ntp = document.getElementById("ntp")

let tabs = []
let activeId = null
let idCounter = 0

function createTab(url = "") {
    const id = idCounter++

    const iframe = document.createElement("iframe")
    iframe.className = "viewframe"
    iframe.dataset.id = id

    iframe.setAttribute("sandbox",
        "allow-scripts allow-same-origin allow-forms allow-modals allow-popups"
    )

    document.body.appendChild(iframe)

    const tabBtn = document.createElement("div")
    tabBtn.className = "tab"
    tabBtn.dataset.id = id
    tabBtn.innerHTML = `<span>New Tab</span><i class="fas fa-xmark"></i>`

    tabBtn.addEventListener("click", e => {
        if (e.target.tagName === "I") closeTab(id)
        else activateTab(id)
    })

    tabsEl.insertBefore(tabBtn, newTabBtn)

    tabs.push({ id, iframe, tabBtn, history: [], index: -1 })
    activateTab(id)

    if (url) navigate(url)
}

function activateTab(id) {
    activeId = id

    tabs.forEach(t => {
        t.iframe.classList.toggle("active", t.id === id)
        t.tabBtn.classList.toggle("active", t.id === id)
    })

    const tab = getTab()
    if (!tab) return

    if (tab.index >= 0) {
        urlInput.value = tab.history[tab.index]
        ntp.style.display = "none"
    } else {
        urlInput.value = ""
        ntp.style.display = "flex"
    }
}

function closeTab(id) {
    if (tabs.length === 1) return

    const i = tabs.findIndex(t => t.id === id)
    const tab = tabs[i]

    tab.iframe.remove()
    tab.tabBtn.remove()
    tabs.splice(i, 1)

    activateTab(tabs[Math.max(0, i - 1)].id)
}

function normalize(input) {
    if (!input.includes(".")) {
        return "https://search.brave.com/search?q=" + encodeURIComponent(input)
    }
    if (!input.startsWith("http")) return "https://" + input
    return input
}

async function navigate(input, push = true) {
    const tab = getTab()
    if (!tab) return

    const url = normalize(input)

    if (push) {
        tab.history = tab.history.slice(0, tab.index + 1)
        tab.history.push(url)
        tab.index++
    }

    if (USE_CODETABS_PROXY) {
        // Use CodeTabs proxy with srcdoc rendering
        try {
            const res = await fetch(
                "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(url)
            )
            
            const html = await res.text()
            
            // Parse HTML
            const parser = new DOMParser()
            const doc = parser.parseFromString(html, "text/html")
            
            // Fix relative links by adding base tag
            const base = doc.createElement("base")
            base.href = url
            doc.head.prepend(base)
            
            // Inject proxy script to handle navigation clicks
            const script = doc.createElement("script")
            script.textContent = `
                // Intercept all link clicks to route through proxy
                document.addEventListener('click', function(e) {
                    const link = e.target.closest('a');
                    if (link && link.href) {
                        e.preventDefault();
                        window.parent.postMessage({type: 'navigate', url: link.href}, '*');
                    }
                });
                // Update parent with current URL
                window.parent.postMessage({type: 'title', title: document.title}, '*');
            `
            doc.head.appendChild(script)
            
            // Render page using srcdoc
            tab.iframe.srcdoc = doc.documentElement.outerHTML
            tab.iframe.dataset.currentUrl = url
            
        } catch (err) {
            tab.iframe.srcdoc = "<h1 style='color:red;text-align:center;margin-top:50px;'>Failed to load page</h1><p style='text-align:center;'>" + err.message + "</p>"
        }
    } else {
        // Use normal UV proxy
        tab.iframe.removeAttribute('srcdoc')
        tab.iframe.src = __uv$config.prefix + __uv$config.encodeUrl(url)
    }
    
    urlInput.value = url
    ntp.style.display = "none"

    // Update tab title
    tab.tabBtn.querySelector("span").textContent = new URL(url).hostname
}

function getTab() {
    return tabs.find(t => t.id === activeId)
}

// Listen for messages from iframe (for CodeTabs proxy navigation)
window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'navigate' && e.data.url) {
        navigate(e.data.url)
    } else if (e.data && e.data.type === 'title' && e.data.title) {
        const tab = getTab()
        if (tab) {
            tab.tabBtn.querySelector("span").textContent = e.data.title
        }
    }
})

/* ===== CONTROLS ===== */
back.onclick = () => {
    const t = getTab()
    if (!t || t.index <= 0) return
    t.index--
    navigate(t.history[t.index], false)
}

forward.onclick = () => {
    const t = getTab()
    if (!t || t.index >= t.history.length - 1) return
    t.index++
    navigate(t.history[t.index], false)
}

reload.onclick = () => {
    const t = getTab()
    if (!t) return
    
    if (USE_CODETABS_PROXY && t.iframe.dataset.currentUrl) {
        // Reload using stored URL
        navigate(t.iframe.dataset.currentUrl, false)
    } else {
        t.iframe.src = t.iframe.src
    }
}

popout.onclick = () => {
    const t = getTab()
    if (!t) return
    
    if (USE_CODETABS_PROXY && t.iframe.dataset.currentUrl) {
        window.open(t.iframe.dataset.currentUrl, "_blank")
    } else {
        window.open(t.iframe.src, "_blank")
    }
}

form.onsubmit = e => {
    e.preventDefault()
    if (urlInput.value.trim()) navigate(urlInput.value)
}

newTabBtn.onclick = () => createTab()

createTab()
</script>



<script>
window.addEventListener('beforeunload', function (e) {
    e.preventDefault();
    e.returnValue = '';
    return '';
});
</script>

</body>
</html>
