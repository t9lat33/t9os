  for (let i = 0; i < 30; i++) {
    if (window.currentUserID) return window.currentUserID;
    await new Promise(r => setTimeout(r, 100));
  }
  return localStorage.getItem(ID_KEY) || "unknown";
}

// ── PROFANITY FILTER ────────────────────────────────────────────────────────
const profanityPatterns = [
  /n+[i1!|]+[gq9]+[e3a@]+r+/gi, /n+[i1!|]+[gq9]+[ae@3]+/gi, /n[i1!|]+b+[b8]+[ae@3]+/gi,
  /\bf+[\s\.\-_]*u+[\s\.\-_]*c+[\s\.\-_]*k+\b/gi, /\bf+[\s\.\-_]*[u@]+[\s\.\-_]*[c(<]+[\s\.\-_]*[k|!]+\b/gi,
  /\bph+u+c+k+\b/gi, /\bs+[\s\.\-_]*h+[\s\.\-_]*[i1!]+[\s\.\-_]*t+\b/gi,
  /\bb+[\s\.\-_]*[i1!]+[\s\.\-_]*t+[\s\.\-_]*c+[\s\.\-_]*h+\b/gi,
  /\bd+[\s\.\-_]*a+[\s\.\-_]*m+[\s\.\-_]*n+\b/gi, /\bc+[\s\.\-_]*r+[\s\.\-_]*a+[\s\.\-_]*p+\b/gi,
  /\bp+[\s\.\-_]*i+[\s\.\-_]*s+[\s\.\-_]*s+\b/gi, /\bf+[\s\.\-_]*a+[\s\.\-_]*g+\b/gi,
  /\bf+[\s\.\-_]*[a@4]+[\s\.\-_]*[gq9]+[o0]*[t+]*\b/gi, /ch+[i1!]+n+k+/gi,
  /sp+[i1!]+c+/gi, /w+[e3]+t+b+[a@]+c+k+/gi,
  /[f₣ƒ]+[u_µ]+[c¢]+[k|<]+/gi, /[b8]+[i!1|]+[t+]+[c¢(<]+[h#]+/gi,
  /[s$5]+[h#]+[i!1|]+[t+]/gi, /[\u0192\uff46]+[\u03bc\uff55]+[\u00a2\uff43]+[\uff4b]/gi
];
function normalizeText(t) {
  return t.toLowerCase().replace(/[\s\.\-_]/g,'').replace(/[0]/g,'o').replace(/[1]/g,'i')
    .replace(/[3]/g,'e').replace(/[4]/g,'a').replace(/[5]/g,'s').replace(/[7]/g,'t')
    .replace(/[8]/g,'b').replace(/[9]/g,'g').replace(/[@]/g,'a').replace(/[!|]/g,'i')
    .replace(/[$]/g,'s').replace(/[+]/g,'t');
}
function containsProfanity(text) {
  for (let p of profanityPatterns) { p.lastIndex=0; if (p.test(text)) return true; }
  const n = normalizeText(text);
  for (let w of ['fuck','shit','bitch','damn','crap','piss','nigger','nigga','fag','faggot','chink','spic','wetback','niger','niga','nibba'])
    if (n.includes(w)) return true;
  return false;
}

function showWarning(message) {
  const toast = document.createElement('div');
  toast.className = 'warning-toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.animation='slideInRight 0.3s ease reverse'; setTimeout(()=>toast.remove(),300); }, 3000);
}
function escapeHtml(s) {
  return (s+'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
}
function isOwnerID(id) { return OWNER_IDS.includes(id); }

// ── BAN ON VIOLATION ────────────────────────────────────────────────────────
async function handleViolation() {
  violationCount++;
  if (violationCount >= MAX_VIOLATIONS) {
    showWarning(`You have been banned for ${MAX_VIOLATIONS} chat filter violations.`);
    const bannedRef = window.banDatabase.ref("bannedIDs");
    const snap      = await bannedRef.get();
    let bannedIDs   = snap.val() || [];
    if (!bannedIDs.includes(myID)) { bannedIDs.push(myID); await bannedRef.set(bannedIDs); }
    setTimeout(() => location.reload(), 2000);
  } else {
    showWarning(`Warning ${violationCount}/${MAX_VIOLATIONS}: Inappropriate language detected. ${MAX_VIOLATIONS - violationCount} warnings remaining.`);
  }
}

// ── MESSAGE RENDERING ───────────────────────────────────────────────────────
function appendMessage(payload) {
  if (payload.id === 'AI_BOT' || payload.isAI) { appendAIMessage(payload.text); return; }

  // Poll message — render the live poll card instead of a normal bubble
  if (payload.isPoll && payload.pollId) {
    const pollRef = ref(db, 'polls/' + currentRoom + '/' + payload.pollId);
    onValue(pollRef, snap => {
      const data = snap.val();
      if (data) renderPollCard(data, payload.pollId);
    }, { onlyOnce: true });
    return;
  }

  const div = document.createElement('div');
  const ownerCls = isOwnerID(payload.id) ? ' owner-msg' : '';
  div.className  = 'msg' + (payload.id === myID ? ' own' : '') + ownerCls;

  const displayName  = payload.name ? `${payload.name} (${payload.id})` : `Anon (${payload.id || 'unknown'})`;
  const ownerBadge   = isOwnerID(payload.id) ? '<span class="owner-badge">Premium</span>' : '';
  const nameCls      = isOwnerID(payload.id) ? 'msg-name owner' : 'msg-name';

  let geoBadge = "";
  if (OWNER_IDS.includes(myID) && payload.geo) {
    geoBadge = `<span style="font-size:.65rem;color:#a8c5ff;margin-left:8px;font-weight:normal;letter-spacing:.5px;">
      📍 ${escapeHtml(payload.geo.city||'?')}, ${escapeHtml(payload.geo.state||'?')}, ${escapeHtml(payload.geo.country||'?')}
    </span>`;
  }

  div.innerHTML = `<div class="${nameCls}">${escapeHtml(displayName)} ${ownerBadge} ${geoBadge}</div>
                   <div class="msg-bubble">${escapeHtml(payload.text)}</div>`;
  messagesEl.appendChild(div);
  if (messagesEl.children.length > MAX_MESSAGES) messagesEl.children[0].remove();
  if (messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 150)
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function appendAIMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg ai-msg';
  div.innerHTML = `<div class="msg-name">🤖 T9 AI <span class="ai-badge">AI</span></div>

function parseAIReply(data) {
  if (typeof data === 'string') return data;
  return data.response || data.reply || data.message || data.text || data.content || data.answer || data.output ||
         data?.choices?.[0]?.message?.content || data?.choices?.[0]?.text || JSON.stringify(data);
}

// ── AI CALL ──────────────────────────────────────────────────────────────────
async function callAI(prompt) {
  if (isAIThinking) { showWarning('AI is still thinking… please wait!'); return; }
  isAIThinking = true;
  sendBtn.disabled = true;
  showAITyping();
  try {
    const res = await fetch(AI_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: prompt }),
      signal: AbortSignal.timeout(15000)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    const text = await res.text();
    let reply;
    try { reply = parseAIReply(JSON.parse(text)); } catch { reply = text; }
    removeAITyping();
    await push(ref(db, "messages/" + currentRoom), {
      name: "T9 AI", id: "AI_BOT", text: reply, timestamp: Date.now(), isAI: true
    });
  } catch (err) {
    removeAITyping();
    appendAIMessage(`⚠️ AI error: ${err.message}`);
  } finally {
    isAIThinking = false;
    sendBtn.disabled = false;
  }
}

// ── SEND via DIRECT FIREBASE PUSH ────────────────────────────────────────────
// Firebase rules (300 char limit, required fields, timestamp validation) act
// as the server-side guard. Worker relay can be added later once /send is live.
async function sendMessageSecure(payload) {
  try {
    await push(ref(db, "messages/" + payload.room), {
      name:      payload.name,
      id:        payload.id,
      text:      payload.text,
      timestamp: payload.timestamp,
      geo:       payload.geo
    });
    return true;
  } catch (err) {
    showWarning('Failed to send message. Please try again.');
    console.error("Firebase push error:", err);
    return false;
  }
}

// ── POLL RENDERING ────────────────────────────────────────────────────────────
const activePollListeners = {}; // pollId -> unsubscribe

function renderPollCard(pollData, pollId) {
  // If card already exists, just update it
  const existing = document.getElementById('poll-' + pollId);
  if (existing) { updatePollCard(existing, pollData); return; }

  const isEnded   = Date.now() >= pollData.endsAt;
  const totalVotes = Object.values(pollData.votes || {}).reduce((a,b) => a+b, 0);
  const userVoted  = pollData.voters && pollData.voters[myID];
  const winnerIdx  = isEnded ? getWinnerIdx(pollData) : -1;

  const card = document.createElement('div');
  card.className = 'poll-card';
  card.id = 'poll-' + pollId;

  const optionsHtml = pollData.options.map((opt, i) => {
    const votes = (pollData.votes && pollData.votes[i]) || 0;
    const pct   = totalVotes ? Math.round(votes / totalVotes * 100) : 0;
    const isWinner = isEnded && i === winnerIdx;
    const isVoted  = userVoted == i;
    return `<div class="poll-option${isVoted?' voted':''}${isWinner?' winner':''}" data-idx="${i}" data-pollid="${pollId}">
      <div class="poll-bar" style="width:${(userVoted !== undefined || isEnded) ? pct : 0}%"></div>
      <span class="poll-option-text">${escapeHtml(opt)}${isWinner?' 🏆':''}</span>
      <span class="poll-pct">${(userVoted !== undefined || isEnded) ? pct+'%' : ''} <span style="color:rgba(180,200,255,0.4)">${votes}</span></span>
    </div>`;
  }).join('');

  const timeLeft = isEnded ? 0 : pollData.endsAt - Date.now();
  const timeStr  = isEnded ? 'Ended' : formatTimeLeft(timeLeft);

  card.innerHTML = `
    <div class="poll-header">
      <span class="poll-badge">POLL</span>
      <span class="poll-creator">${escapeHtml(pollData.creatorName)} (${escapeHtml(pollData.creatorId)})</span>
    </div>
    <div class="poll-question">${escapeHtml(pollData.question)}</div>
    ${optionsHtml}
    <div class="poll-footer">
      <span>🗳️ ${totalVotes} vote${totalVotes!==1?'s':''}</span>
      <span>⏱ ${timeStr}</span>
    </div>
    ${isEnded ? `<div class="poll-ended-banner">🏆 Poll ended! Winner: "${escapeHtml(pollData.options[winnerIdx] || '?')}"</div>` : ''}
  `;

  // Click to vote (only if not ended and not already voted)
  if (!isEnded && userVoted === undefined) {
    card.querySelectorAll('.poll-option').forEach(optEl => {
      optEl.addEventListener('click', () => castVote(pollId, parseInt(optEl.dataset.idx)));
    });
  }

  messagesEl.appendChild(card);
  if (messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 200)
    messagesEl.scrollTop = messagesEl.scrollHeight;

  // Live updates
  if (!activePollListeners[pollId]) {
    const pollRef = ref(db, 'polls/' + currentRoom + '/' + pollId);
    activePollListeners[pollId] = onValue(pollRef, snap => {
      const data = snap.val();
      if (data) updatePollCard(document.getElementById('poll-' + pollId), data);
    });
  }

  // Auto-end timer
  if (!isEnded) {
    setTimeout(() => {
      const el = document.getElementById('poll-' + pollId);
      if (el) {
        const pollRef = ref(db, 'polls/' + currentRoom + '/' + pollId);
        // re-render as ended
        import("https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js").then(({onValue:ov}) => {});
        // just trigger a re-read
        updatePollCard(el, {...pollData, endsAt: Date.now() - 1});
      }
    }, timeLeft + 200);
  }
}

function updatePollCard(card, pollData) {
  if (!card) return;
  const pollId     = card.id.replace('poll-', '');
  const isEnded    = Date.now() >= pollData.endsAt;
  const totalVotes = Object.values(pollData.votes || {}).reduce((a,b) => a+b, 0);
  const userVoted  = pollData.voters && pollData.voters[myID];
  const winnerIdx  = isEnded ? getWinnerIdx(pollData) : -1;

  const optionsHtml = pollData.options.map((opt, i) => {
    const votes = (pollData.votes && pollData.votes[i]) || 0;
    const pct   = totalVotes ? Math.round(votes / totalVotes * 100) : 0;
    const isWinner = isEnded && i === winnerIdx;
    const isVoted  = userVoted == i;
    return `<div class="poll-option${isVoted?' voted':''}${isWinner?' winner':''}" data-idx="${i}" data-pollid="${pollId}">
      <div class="poll-bar" style="width:${(userVoted !== undefined || isEnded) ? pct : 0}%"></div>
      <span class="poll-option-text">${escapeHtml(opt)}${isWinner?' 🏆':''}</span>
      <span class="poll-pct">${(userVoted !== undefined || isEnded) ? pct+'%' : ''} <span style="color:rgba(180,200,255,0.4)">${votes}</span></span>
    </div>`;
  }).join('');

  const timeLeft = isEnded ? 0 : Math.max(0, pollData.endsAt - Date.now());
  const timeStr  = isEnded ? 'Ended' : formatTimeLeft(timeLeft);

  card.innerHTML = `
    <div class="poll-header">
      <span class="poll-badge">POLL</span>
      <span class="poll-creator">${escapeHtml(pollData.creatorName)} (${escapeHtml(pollData.creatorId)})</span>
    </div>
    <div class="poll-question">${escapeHtml(pollData.question)}</div>
    ${optionsHtml}
    <div class="poll-footer">
      <span>🗳️ ${totalVotes} vote${totalVotes!==1?'s':''}</span>
      <span>⏱ ${timeStr}</span>
    </div>
    ${isEnded ? `<div class="poll-ended-banner">🏆 Poll ended! Winner: "${escapeHtml(pollData.options[winnerIdx] || '?')}"</div>` : ''}
  `;

  if (!isEnded && userVoted === undefined) {
    card.querySelectorAll('.poll-option').forEach(optEl => {
      optEl.addEventListener('click', () => castVote(pollId, parseInt(optEl.dataset.idx)));
    });
  }
}

function getWinnerIdx(pollData) {
  const votes = pollData.votes || {};
  let max = -1, winner = 0;
  pollData.options.forEach((_, i) => {
    const v = votes[i] || 0;
    if (v > max) { max = v; winner = i; }
  });
  return winner;
}

function formatTimeLeft(ms) {
  if (ms <= 0) return 'Ended';
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's left';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm left';
  return Math.floor(m / 60) + 'h left';
}

async function castVote(pollId, optionIdx) {
  if (!myID) return;
  const pollRef = ref(db, 'polls/' + currentRoom + '/' + pollId);
  // Read current state first
  const { get } = await import("https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js");
  const snap    = await get(pollRef);
  const data    = snap.val();
  if (!data) return;
  if (Date.now() >= data.endsAt) { showWarning('This poll has ended!'); return; }
  if (data.voters && data.voters[myID] !== undefined) { showWarning('You already voted!'); return; }

  const currentVotes = (data.votes && data.votes[optionIdx]) || 0;
  await update(pollRef, {
    [`votes/${optionIdx}`]: currentVotes + 1,
    [`voters/${myID}`]: optionIdx
  });
}

async function sendMessage() {
  const txt = msgInput.value.trim();
  if (!txt) return;

  // !ai command — still goes direct to AI worker, not the relay
  if (txt.toLowerCase().startsWith('!ai ')) {
    const prompt = txt.slice(4).trim();
    if (!prompt) { showWarning('Please provide a prompt after !ai'); return; }
    msgInput.value = '';
    updateCharCounter();
    // Show user's own message immediately
    const div = document.createElement('div');
    div.className = 'msg own';
    div.innerHTML = `<div class="msg-name">${escapeHtml(username)} (${escapeHtml(myID)})</div>
                     <div class="msg-bubble">${escapeHtml(txt)}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    await callAI(prompt);
    return;
  }

  // Client-side guards (secondary layer; worker is primary)
  const now = Date.now();
  const timeLeft = MESSAGE_COOLDOWN - (now - lastMessageTime);
  if (timeLeft > 0) { showWarning(`Please wait ${Math.ceil(timeLeft/1000)} seconds before sending.`); return; }
  if (txt.length > MAX_CHARS) { showWarning(`Message too long! Maximum ${MAX_CHARS} characters.`); return; }
  if (containsProfanity(txt)) { msgInput.value=''; updateCharCounter(); await handleViolation(); return; }

  sendBtn.disabled = true;

  const payload = {
    name: username,
    id: myID,
    text: txt,
    timestamp: Date.now(),
    room: currentRoom,
    geo: userGeoData
  };

  const ok = await sendMessageSecure(payload);
  if (ok) {
    msgInput.value = '';
    updateCharCounter();
    lastMessageTime = Date.now();
    setTimeout(() => { sendBtn.disabled = false; }, MESSAGE_COOLDOWN);
  } else {
    sendBtn.disabled = false;
  }
}

// ── CHAR COUNTER ─────────────────────────────────────────────────────────────
function updateCharCounter() {
  const length = msgInput.value.length;
  charCounter.textContent = `${length}/${MAX_CHARS}`;
  charCounter.classList.remove('warning','error');
  if (length > MAX_CHARS * 0.9)      charCounter.classList.add('error');
  else if (length > MAX_CHARS * 0.75) charCounter.classList.add('warning');
}
msgInput.addEventListener('input', updateCharCounter);
sendBtn.addEventListener('click', sendMessage);
msgInput.addEventListener('keypress', e => { if (e.key==='Enter') sendMessage(); });

// ── MESSAGE QUEUE ─────────────────────────────────────────────────────────────
function processMessageQueue() {
  if (isProcessingQueue || messageQueue.length===0) return;
  isProcessingQueue = true;
  const batch = messageQueue.splice(0,5);
  batch.forEach(m => appendMessage(m));
  isProcessingQueue = false;
  if (messageQueue.length>0) setTimeout(processMessageQueue,50);
}

function clearMessages() { messagesEl.innerHTML=''; }

function loadMessages(room) {
  if (currentListener) off(currentListener);
  clearMessages();
  messageQueue = [];
  const messagesRef = ref(db, "messages/" + room);
  const limited     = query(messagesRef, limitToLast(100));
  currentListener   = messagesRef;
  onChildAdded(limited, snap => {
    const m = snap.val();
    if (!m) return;
    messageQueue.push(m);
    if (!isProcessingQueue) processMessageQueue();
  });
}

// ── NAME MODAL ────────────────────────────────────────────────────────────────
async function handleNameSubmit(e) {
  if (e) e.preventDefault();
  const name = nameInput.value.trim();
  if (!name) { alert('Enter a display name'); return; }
  if (containsProfanity(name)) { alert('Your display name contains inappropriate language.'); return; }
  username = name.substring(0, 32);

  // Resolve ID now (waits for the ban-script DOMContentLoaded if needed)
  myID = await getMyID();

  // Show poll button only for premium/owner users
  const ownerSet = ["6528690208","3222695271","0376780508","0635354315","3293484597","9937301888","5069664537","1362852477","2126917941","1362852477"];
  if (ownerSet.includes(myID)) createPollBtn.style.display = 'block';

  nameModal.remove();
  loadMessages(currentRoom);
}
nameSubmit.addEventListener('click', handleNameSubmit);
nameInput.addEventListener('keydown', e => { if (e.key==='Enter') handleNameSubmit(e); });
setTimeout(() => nameInput.focus(), 100);

// ── ROOMS ─────────────────────────────────────────────────────────────────────
let joinedRooms = new Set(['public']);

function refreshJoinedRoomsUI() {
  joinedRoomsEl.innerHTML = '';
  joinedRooms.forEach(room => {
    if (room==='public') return;
    const div = document.createElement('div');
    div.className = 'sidebar-item';
    div.innerText = room;
    div.addEventListener('click', () => switchRoom(room));
    joinedRoomsEl.appendChild(div);
  });
}

function switchRoom(room) {
  currentRoom = room;
  roomTitle.innerText = room==='public' ? 'Public Chat' : room;
  messageQueue = [];
  loadPolls(room);
  loadMessages(currentRoom);
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  if (room==='public') { publicRoomBtn.classList.add('active'); }
  else { Array.from(joinedRoomsEl.children).forEach(el => { if(el.innerText===room) el.classList.add('active'); }); }
}

publicRoomBtn.addEventListener('click', () => switchRoom('public'));
createRoomBtn.addEventListener('click', () => {
  const room = prompt("Enter new room name:")?.trim();
  if (!room) return;
  if (containsProfanity(room)) { alert('Room name contains inappropriate language.'); return; }
  joinedRooms.add(room);
  refreshJoinedRoomsUI();
  switchRoom(room);
});
joinRoomBtn.addEventListener('click', () => {
  const room = prompt("Enter room name to join:")?.trim();
  if (!room) return;
  joinedRooms.add(room);
  refreshJoinedRoomsUI();
  switchRoom(room);
});
</script>
