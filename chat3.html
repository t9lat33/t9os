                   <div class="msg-bubble">${escapeHtml(payload.text)}</div>`;
  
  messagesEl.appendChild(div);
  if (messagesEl.children.length > MAX_MESSAGES) messagesEl.children[0].remove();
  if (messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 150)
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function appendAIMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg ai-msg';
  div.innerHTML = `<div class="msg-name">đź¤– T9 AI <span class="ai-badge">AI</span></div>
                   <div class="msg-bubble">${escapeHtml(text)}</div>`;
  messagesEl.appendChild(div);
  if (messagesEl.children.length > MAX_MESSAGES) messagesEl.children[0].remove();
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showAITyping() {
  const div = document.createElement('div');
  div.className = 'msg ai-msg ai-typing';
  div.id = 'aiTypingIndicator';
  div.innerHTML = `<div class="msg-name">đź¤– T9 AI <span class="ai-badge">AI</span></div>
                   <div class="msg-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeAITyping() { const el = document.getElementById('aiTypingIndicator'); if (el) el.remove(); }

function parseAIReply(data) {
  if (typeof data === 'string') return data;
  return data.response || data.reply || data.message || data.text || data.content || data.answer || data.output ||
         data?.choices?.[0]?.message?.content || data?.choices?.[0]?.text || JSON.stringify(data);
}

async function callAI(prompt) {
  if (isAIThinking) { showWarning('AI is still thinkingâ€¦ please wait!'); return; }
  isAIThinking = true;
  sendBtn.disabled = true;
  showAITyping();
  try {
    const res = await fetch(AI_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: prompt }),
      signal: AbortSignal.timeout(15000)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    const text = await res.text();
    let reply;
    try { reply = parseAIReply(JSON.parse(text)); } catch { reply = text; }
    removeAITyping();
    await push(ref(db, "messages/" + currentRoom), {
      name: "T9 AI",
      id: "AI_BOT",
      text: reply,
      timestamp: Date.now(),
      isAI: true
    });
  } catch (err) {
    removeAITyping();
    appendAIMessage(`âš ď¸Ź AI error: ${err.message}`);
  } finally {
    isAIThinking = false;
    sendBtn.disabled = false;
  }
}

function clearMessages() { messagesEl.innerHTML = ''; }

function processMessageQueue() {
  if (isProcessingQueue || messageQueue.length === 0) return;
  isProcessingQueue = true;
  const batch = messageQueue.splice(0, 5);
  batch.forEach(msg => appendMessage(msg, false));
  isProcessingQueue = false;
  if (messageQueue.length > 0) setTimeout(processMessageQueue, 50);
}

function loadMessages(room) {
  if (currentListener) off(currentListener);
  clearMessages();
  messageQueue = [];
  const messagesRef = ref(db, "messages/" + room);
  const limitedQuery = query(messagesRef, limitToLast(100));
  currentListener = messagesRef;
  onChildAdded(limitedQuery, snap => {
    const m = snap.val();
    if (!m) return;
    messageQueue.push(m);
    if (!isProcessingQueue) processMessageQueue();
  });
}

async function sendMessage() {
  const txt = msgInput.value.trim();
  if (!txt) return;

  if (txt.toLowerCase().startsWith('!ai ')) {
    const prompt = txt.slice(4).trim();
    if (!prompt) { showWarning('Please provide a prompt after !ai'); return; }
    msgInput.value = '';
    updateCharCounter();
    const div = document.createElement('div');
    div.className = 'msg own';
    div.innerHTML = `<div class="msg-name">${escapeHtml(username)} (${escapeHtml(myID)})</div>
                     <div class="msg-bubble">${escapeHtml(txt)}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    await callAI(prompt);
    return;
  }

  const now = Date.now();
  const timeLeft = MESSAGE_COOLDOWN - (now - lastMessageTime);
  if (timeLeft > 0) { showWarning(`Please wait ${Math.ceil(timeLeft / 1000)} seconds before sending another message.`); return; }
  if (txt.length > MAX_CHARS) { showWarning(`Message too long! Maximum ${MAX_CHARS} characters.`); return; }
  if (containsProfanity(txt)) { msgInput.value = ''; updateCharCounter(); await handleViolation(); return; }

  sendBtn.disabled = true;
  
  const messagePayload = { 
    name: username, 
    id: myID, 
    text: txt, 
    timestamp: Date.now(),
    geo: userGeoData 
  };

  try {
    await push(ref(db, "messages/" + currentRoom), messagePayload);
    msgInput.value = '';
    updateCharCounter();
    lastMessageTime = now;
    setTimeout(() => { sendBtn.disabled = false; }, MESSAGE_COOLDOWN);
  } catch (error) {
    console.error('Error sending message:', error);
    showWarning('Failed to send message. Please try again.');
    sendBtn.disabled = false;
  }
}

function updateCharCounter() {
  const length = msgInput.value.length;
  charCounter.textContent = `${length}/${MAX_CHARS}`;
  charCounter.classList.remove('warning', 'error');
  if (length > MAX_CHARS * 0.9) charCounter.classList.add('error');
  else if (length > MAX_CHARS * 0.75) charCounter.classList.add('warning');
}

msgInput.addEventListener('input', updateCharCounter);
sendBtn.addEventListener('click', sendMessage);
msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

function handleNameSubmit(e) {
  if (e) e.preventDefault();
  const name = nameInput.value.trim();
  if (!name) { alert('Enter a display name'); return; }
  if (containsProfanity(name)) { alert('Your display name contains inappropriate language. Please choose another name.'); return; }
  username = name.substring(0, 32);
  nameModal.remove();
  loadMessages(currentRoom);
}

nameSubmit.addEventListener('click', handleNameSubmit);
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleNameSubmit(e); });
setTimeout(() => nameInput.focus(), 100);

let joinedRooms = new Set(['public']);

function refreshJoinedRoomsUI() {
  joinedRoomsEl.innerHTML = '';
  joinedRooms.forEach(room => {
    if (room === 'public') return;
    const div = document.createElement('div');
    div.className = 'sidebar-item';
    div.innerText = room;
    div.addEventListener('click', () => { switchRoom(room); });
    joinedRoomsEl.appendChild(div);
  });
}

function switchRoom(room) {
  currentRoom = room;
  roomTitle.innerText = room === 'public' ? 'Public Chat' : room;
  messageQueue = [];
  loadMessages(currentRoom);
  Array.from(document.querySelectorAll('.sidebar-item')).forEach(el => el.classList.remove('active'));
  if (room === 'public') { publicRoomBtn.classList.add('active'); }
  else { Array.from(joinedRoomsEl.children).forEach(el => { if (el.innerText === room) el.classList.add('active'); }); }
}

publicRoomBtn.addEventListener('click', () => { switchRoom('public'); });
createRoomBtn.addEventListener('click', () => {
  const room = prompt("Enter new room name:")?.trim();
  if (!room) return;
  if (containsProfanity(room)) { alert('Room name contains inappropriate language.'); return; }
  joinedRooms.add(room);
  refreshJoinedRoomsUI();
  switchRoom(room);
});
joinRoomBtn.addEventListener('click', () => {
  const room = prompt("Enter room name to join:")?.trim();
  if (!room) return;
  joinedRooms.add(room);
  refreshJoinedRoomsUI();
  switchRoom(room);
});
</script>
</body>
